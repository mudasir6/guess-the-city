<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the City</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">

    <!-- Start Screen -->
    <section id="screen-start" class="screen active">
      <div class="screen-content">
        <div class="logo">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="32" r="28" stroke="#6c5ce7" stroke-width="3" fill="none"/>
            <ellipse cx="32" cy="32" rx="14" ry="28" stroke="#6c5ce7" stroke-width="2" fill="none"/>
            <line x1="4" y1="32" x2="60" y2="32" stroke="#6c5ce7" stroke-width="2"/>
            <line x1="32" y1="4" x2="32" y2="60" stroke="#6c5ce7" stroke-width="2"/>
            <path d="M8 20 Q32 16 56 20" stroke="#6c5ce7" stroke-width="1.5" fill="none"/>
            <path d="M8 44 Q32 48 56 44" stroke="#6c5ce7" stroke-width="1.5" fill="none"/>
          </svg>
        </div>
        <h1>Guess the City</h1>
        <p class="subtitle">Can you identify cities from their photos?</p>
        <button id="btn-start" class="btn btn-primary">Start Game</button>
      </div>
    </section>

    <!-- Setup screen removed — API key handled server-side -->
    <section id="screen-setup" class="screen">
      <div class="screen-content">
        <p id="setup-error" class="error-text" hidden></p>
      </div>
    </section>

    <!-- Loading Screen -->
    <section id="screen-loading" class="screen">
      <div class="screen-content">
        <div class="spinner"></div>
        <p class="loading-text">Loading city photos...</p>
      </div>
    </section>

    <!-- Game Round Screen -->
    <section id="screen-game" class="screen">
      <header class="game-header">
        <span id="round-indicator">Round 1 / 5</span>
        <span id="score-indicator">Score: 0</span>
      </header>
      <div class="game-body">
        <div id="photo-container" class="photo-container">
          <img id="city-photo" src="" alt="Mystery city photo">
          <div id="photo-fallback" class="fallback" hidden>
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="8" width="40" height="32" rx="4" stroke="#a0a0b8" stroke-width="2" fill="none"/>
              <circle cx="16" cy="20" r="4" stroke="#a0a0b8" stroke-width="2" fill="none"/>
              <path d="M4 32 L16 24 L28 32 L36 26 L44 32" stroke="#a0a0b8" stroke-width="2" fill="none"/>
            </svg>
            <p>Photo unavailable</p>
          </div>
        </div>
        <p id="attribution" class="attribution"></p>
        <div id="options-container" class="options-grid"></div>
        <button id="btn-next" class="btn btn-secondary" hidden>Next Round</button>
      </div>
    </section>

    <!-- Results Screen -->
    <section id="screen-results" class="screen">
      <div class="screen-content">
        <h2>Game Over!</h2>
        <p id="final-score" class="final-score"></p>
        <p id="result-message" class="result-message"></p>
        <div id="round-summary" class="round-summary"></div>
        <button id="btn-play-again" class="btn btn-primary">Play Again</button>
      </div>
    </section>

  </div>

  <script type="module" src="js/ui.js"></script>
</body>
</html>
